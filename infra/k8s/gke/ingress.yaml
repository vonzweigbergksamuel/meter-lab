apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: meter-lab-ingress
  namespace: meter-lab
spec:
  rules:
    - http:
        paths:
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: auth
                port:
                  number: 5090
          - path: /backend
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5070
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 5080
